<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topo">
       
        <div>
            <h1>Login</h1>
        </div>
    </header>
    <main class="conteudo">
        <section class="painel card">
            <h1>Login</h1>
    <form id="formLogin" class="form-painel">
        <label for="username">E-mail:</label>
        <input type="email" id="username" name="username" placeholder="E-mail cadastrado" required>

        <label for="password">Senha:</label>
        <input type="password" id="password" name="password" placeholder="Senha" required>

        <button type="submit">Entrar</button>
    </form>
    <p>Não tem conta? <a href="index.html">Cadastre-se aqui</a>.</p>
    <script src="script.js"></script>
</body>
</html>
