<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Empréstimo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="topo">
        <div>
            <h1>Controle de Empréstimo</h1>
        </div>
        <div class="badge">
            <span id="usuarioLogado"></span>
            <button id="btnLogout" type="button" class="logout-btn">Sair</button>
        </div>
    </header>

    <main class="conteudo">
        <section class="painel painel-emprestimos card">
            <h2>Gerenciar Empréstimos</h2>
            <p>Somente o administrador vê esta página. Aqui estão os empréstimos registrados.</p>
            <div class="subtitulo">Empréstimos ativos</div>
            <ul id="listaEmprestimos" class="lista"></ul>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
