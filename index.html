<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioTech</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="topo">
        <div>
            <h1>Cadastro de Usuários</h1>
            <p>Sistema de cadastro, busca de livros e controle de empréstimos no navegador.</p>
        </div>
        <div class="badge">
            <span id="usuarioLogado"></span>
            <button id="btnLogout" type="button" class="logout-btn">Sair</button>
        </div>
    </header>

    <main class="conteudo">
        <section class="painel painel-clientes card">
            <h2>Cadastro de Usuários</h2>
            <p class="warning-text">Cadastre apenas leitores. O administrador não deve ser cadastrado aqui.</p>
            <p>O administrador acessa com login <strong>admin</strong> e senha <strong>admin</strong>.</p>
            <form id="formCliente" class="form-painel">
                <input id="nome" type="text" placeholder="Nome completo" autocomplete="name">
                <input id="cpf" type="text" placeholder="CPF" autocomplete="off">
                <input id="email" type="email" placeholder="E-mail" autocomplete="email">
                <input id="senha" type="password" placeholder="Senha" autocomplete="new-password">
                <button type="submit">Cadastrar Leitor</button>
            </form>
            <div class="subtitulo">Usuários cadastrados</div>
            <ul id="listaClientes" class="lista"></ul>
        </section>

    </main>

    <script src="script.js"></script>
</body>

</html>
